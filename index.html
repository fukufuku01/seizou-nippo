<body>
<div id="app"></div>
<script>
// ─── GitHub設定 ───────────────────────────────────────────────
var GH_OWNER  = "fukufuku01";
var GH_REPO   = "seizou-nippo";
var GH_BRANCH = "main";

var BATCH_LABELS = ["１釜目","２釜目","３釜目"];
var BATCH_KEYS   = ["batch1","batch2","batch3"];
var BATCH_COLORS = ["#C0392B","#1F618D","#1E8449"];
var CSV_HEADERS  = ["製造日","記入者","保存日時",
  "１釜目_品名","１釜目_製造数","１釜目_開始","１釜目_終了","１釜目_備考",
  "２釜目_品名","２釜目_製造数","２釜目_開始","２釜目_終了","２釜目_備考",
  "３釜目_品名","３釜目_製造数","３釜目_開始","３釜目_終了","３釜目_備考",
  "半製品","その他"];

function emptyBatch() { return { name:"", qty:"", start:"", end:"", notes:"" }; }
function emptyForm()  {
  return { author:"", date:"",
    batch1:emptyBatch(), batch2:emptyBatch(), batch3:emptyBatch(),
    semiProduct:"", otherNotes:"" };
}

// ─── GitHub API ───────────────────────────────────────────────
function getToken() { return localStorage.getItem("gh_token") || ""; }

function toBase64(str) {
  var bytes = new TextEncoder().encode(str);
  var bin = "";
  bytes.forEach(function(b){ bin += String.fromCharCode(b); });
  return btoa(bin);
}

function ghRequest(url, method, body) {
  method = method || "GET";
  var opts = {
    method: method,
    headers: {
      "Authorization": "token " + getToken(),
      "Accept": "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28"
    }
  };
  if (body) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  return fetch(url, opts).then(function(res) {
    return res.json().catch(function(){ return {}; }).then(function(data) {
      if (!res.ok) {
        var msg = data.message || res.statusText;
        if (res.status === 401) msg = "Token認証失敗(401)：Tokenを確認してください";
        if (res.status === 403) msg = "権限不足(403)：TokenのContents権限をRead and writeにしてください";
        if (res.status === 404) msg = "リポジトリが見つかりません(404)：リポジトリ名を確認してください";
        throw new Error(msg);
      }
      return data;
    });
  });
}

function ghTest() {
  return ghRequest("https://api.github.com/repos/" + GH_OWNER + "/" + GH_REPO);
}

function ghLoad() {
  return ghRequest(
    "https://api.github.com/repos/" + GH_OWNER + "/" + GH_REPO + "/contents/reports?ref=" + GH_BRANCH
  ).then(function(files) {
    if (!Array.isArray(files)) return [];
    var jsonFiles = files.filter(function(f){ return f.name.endsWith(".json"); });
    return Promise.all(jsonFiles.map(function(f) {
      return ghRequest(
        "https://api.github.com/repos/" + GH_OWNER + "/" + GH_REPO + "/contents/reports/" + f.name + "?ref=" + GH_BRANCH
      ).then(function(data) {
        var decoded = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ""))));
        return JSON.parse(decoded);
      }).catch(function(){ return null; });
    })).then(function(records) {
      return records.filter(Boolean).sort(function(a,b){
        return (b.date||"").localeCompare(a.date||"");
      });
    });
  }).catch(function(e) {
    if (e.message && e.message.includes("404")) return [];
    throw e;
  });
}

function ghSave(record) {
  var date = record.date || new Date().toISOString().slice(0,10);
  var path = "reports/" + date + "_" + record.id + ".json";
  var url  = "https://api.github.com/repos/" + GH_OWNER + "/" + GH_REPO + "/contents/" + path;
  var content = toBase64(JSON.stringify(record, null, 2));
  return ghRequest(url).then(function(ex) {
    return ghRequest(url, "PUT", {
      message: "日報: " + date + " (" + (record.author||"不明") + ")",
      content: content, branch: GH_BRANCH, sha: ex.sha
    });
  }).catch(function(e) {
    if (e.message && e.message.includes("404")) {
      return ghRequest(url, "PUT", {
        message: "日報: " + date + " (" + (record.author||"不明") + ")",
        content: content, branch: GH_BRANCH
      });
    }
    throw e;
  });
}

function ghDelete(record) {
  var date = record.date || "unknown";
  var path = "reports/" + date + "_" + record.id + ".json";
  var url  = "https://api.github.com/repos/" + GH_OWNER + "/" + GH_REPO + "/contents/" + path;
  return ghRequest(url).then(function(ex) {
    return ghRequest(url, "DELETE", {
      message: "日報削除: " + date, sha: ex.sha, branch: GH_BRANCH
    });
  });
}

// ─── CSV ──────────────────────────────────────────────────────
function toCSV(records) {
  var rows = records.map(function(r) {
    return [r.date, r.author, r.savedAt,
      r.batch1.name, r.batch1.qty, r.batch1.start, r.batch1.end, r.batch1.notes,
      r.batch2.name, r.batch2.qty, r.batch2.start, r.batch2.end, r.batch2.notes,
      r.batch3.name, r.batch3.qty, r.batch3.start, r.batch3.end, r.batch3.notes,
      r.semiProduct, r.otherNotes
    ].map(function(v){ return '"' + (v||"").replace(/"/g,'""') + '"'; }).join(",");
  });
  return "\uFEFF" + CSV_HEADERS.join(",") + "\n" + rows.join("\n");
}
function dlCSV(records) {
  var blob = new Blob([toCSV(records)], { type:"text/csv;charset=utf-8;" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href=url; a.download="nippo_" + new Date().toISOString().slice(0,10) + ".csv";
  a.click(); URL.revokeObjectURL(url);
}
function dlTemplate() {
  var example = '"2026-04-22","山田太郎","","製品A","150kg","08:00","10:00","異常なし","製品B","200kg","10:30","12:30","","","","","","","",""';
  var csv = "\uFEFF" + CSV_HEADERS.join(",") + "\n" + example;
  var blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href=url; a.download="nippo_template.csv";
  a.click(); URL.revokeObjectURL(url);
}
function parseCSV(text) {
  var lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n").filter(function(l){ return l.trim(); });
  if (lines.length < 2) return [];
  var headers = lines[0].split(",").map(function(h){ return h.replace(/^"|"$/g,"").trim(); });
  var records = [];
  for (var i=1; i<lines.length; i++) {
    var vals = [], cur = "", inQ = false;
    for (var c=0; c<lines[i].length; c++) {
      var ch = lines[i][c];
      if (ch==='"') { inQ=!inQ; }
      else if (ch==="," && !inQ) { vals.push(cur); cur=""; }
      else { cur+=ch; }
    }
    vals.push(cur);
    var obj = {};
    headers.forEach(function(h,idx){ obj[h]=(vals[idx]||"").trim(); });
    if (!obj["製造日"]) continue;
    records.push({
      id: Date.now().toString() + "_" + i,
      savedAt: obj["保存日時"] || new Date().toISOString(),
      date:    obj["製造日"],
      author:  obj["記入者"]||"",
      batch1:  { name:obj["１釜目_品名"]||"", qty:obj["１釜目_製造数"]||"", start:obj["１釜目_開始"]||"", end:obj["１釜目_終了"]||"", notes:obj["１釜目_備考"]||"" },
      batch2:  { name:obj["２釜目_品名"]||"", qty:obj["２釜目_製造数"]||"", start:obj["２釜目_開始"]||"", end:obj["２釜目_終了"]||"", notes:obj["２釜目_備考"]||"" },
      batch3:  { name:obj["３釜目_品名"]||"", qty:obj["３釜目_製造数"]||"", start:obj["３釜目_開始"]||"", end:obj["３釜目_終了"]||"", notes:obj["３釜目_備考"]||"" },
      semiProduct: obj["半製品"]||"",
      otherNotes:  obj["その他"]||""
    });
  }
  return records;
}

// ─── DOM helpers ──────────────────────────────────────────────
function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === "style" && typeof attrs[k]==="object") {
      Object.assign(e.style, attrs[k]);
    } else if (k.startsWith("on")) {
      e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    } else if (k === "className") {
      e.className = attrs[k];
    } else if (k === "htmlFor") {
      e.htmlFor = attrs[k];
    } else {
      e.setAttribute(k, attrs[k]);
    }
  });
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(function(c) {
      if (c == null) return;
      e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
  }
  return e;
}

function showMsg(container, text, isOk, ms) {
  var d = el("div", { className: isOk ? "msg-ok" : "msg-err" }, text);
  container.insertBefore(d, container.firstChild);
  setTimeout(function(){ if (d.parentNode) d.parentNode.removeChild(d); }, ms||5000);
}

// ─── State ────────────────────────────────────────────────────
var state = {
  token: localStorage.getItem("gh_token") || "",
  page: "login", // login | main
  mode: "input", // input | admin
  form: emptyForm(),
  formPage: "form", // form | preview
  submittedRecord: null,
  records: [],
  detail: null,
  search: "",
  filterAuthor: "all",
  filterMonth: "all",
  showImport: false,
  loading: false,
};

function render() {
  var app = document.getElementById("app");
  app.innerHTML = "";
  if (state.page === "login") { app.appendChild(buildLogin()); return; }
  if (state.showImport) { app.appendChild(buildImportModal()); }
  var wrapper = el("div");
  wrapper.appendChild(buildTabBar());
  if (state.mode === "input") {
    if (state.formPage === "preview") wrapper.appendChild(buildPreview());
    else wrapper.appendChild(buildForm());
  } else {
    if (state.detail) wrapper.appendChild(buildDetail());
    else wrapper.appendChild(buildAdmin());
  }
  app.appendChild(wrapper);
}

// ─── Login ────────────────────────────────────────────────────
function buildLogin() {
  var msgArea = el("div");
  var tokenInput = el("input", {
    className:"login-input", type:"password",
    placeholder:"github_pat_xxxxxxxxxxxx"
  });
  tokenInput.value = state.token;
  tokenInput.addEventListener("input", function(){ state.token = this.value.trim(); });

  var btn = el("button", { className:"login-btn" }, "ログイン →");
  btn.addEventListener("click", function() {
    if (!state.token) { showMsg(msgArea, "Tokenを入力してください", false); return; }
    btn.textContent = "確認中…"; btn.disabled = true;
    localStorage.setItem("gh_token", state.token);
    ghTest().then(function(data) {
      showMsg(msgArea, "接続成功！「" + data.full_name + "」に接続しました ✅", true);
      setTimeout(function() {
        state.page = "main";
        render();
      }, 800);
    }).catch(function(e) {
      showMsg(msgArea, e.message, false);
      btn.textContent = "ログイン →"; btn.disabled = false;
    });
  });
  tokenInput.addEventListener("keydown", function(e){ if(e.key==="Enter") btn.click(); });

  return el("div", { className:"login-root" }, [
    el("div", { className:"login-box" }, [
      el("div", { className:"login-icon" }, "📋"),
      el("h1", { className:"login-title" }, "製造日報システム"),

      el("div", { className:"login-card" }, [

        ]),
        el("label", { className:"login-label" }, "Personal Access Token"),
        tokenInput, msgArea, btn,
        el("div", { className:"login-guide" }, [
          el("b", null, "Tokenの発行方法："),
          el("br"), document.createTextNode("GitHub → Settings → Developer settings"),
          el("br"), document.createTextNode("→ Fine-grained tokens → Generate new token"),

// ─── Admin ────────────────────────────────────────────────────
function loadRecords() {
  state.loading = true; render();
  ghLoad().then(function(data) {
    state.records = data; state.loading = false; render();
  }).catch(function(e) {
    state.loading = false; render();
    var msgArea = document.querySelector(".m-main");
    if (msgArea) showMsg(msgArea,"読み込み失敗 → "+e.message,false);
  });
}

function getFiltered() {
  var q = state.search.toLowerCase();
  return state.records.filter(function(r) {
    var ms = !q||(r.author||"").toLowerCase().includes(q)||(r.date||"").includes(q)
      ||BATCH_KEYS.some(function(k){ return (r[k]&&r[k].name||"").toLowerCase().includes(q); })
      ||(r.semiProduct||"").includes(q)||(r.otherNotes||"").includes(q);
    return ms&&(state.filterAuthor==="all"||r.author===state.filterAuthor)
              &&(state.filterMonth==="all"||(r.date||"").startsWith(state.filterMonth));
  });
}

function buildAdmin() {
  var filtered  = getFiltered();
  var authors   = [...new Set(state.records.map(function(r){ return r.author; }).filter(Boolean))];
  var months    = [...new Set(state.records.map(function(r){ return (r.date||"").slice(0,7); }).filter(Boolean))].sort().reverse();
  var thisMonth = new Date().toISOString().slice(0,7);
  var msgArea   = el("div",{style:{padding:"0 12px"}});

  function statBox(label, val) {
    return el("div",{className:"m-stat-box"},[
      el("div",{className:"m-stat-val"},String(val)),
      el("div",{className:"m-stat-label"},label)
    ]);
  }
  function sideBtn(icon, label, cb) {
    var b = el("button",{className:"m-side-btn"},[document.createTextNode(icon+" "+label)]);
    b.addEventListener("click",cb); return b;
  }

  // サイドバー
  var sidebar = el("div",{className:"m-sidebar no-print"},[
    el("div",{className:"m-sidebar-title"},"管理画面"),
    el("div",{style:{display:"flex",flexDirection:"column",gap:"8px",padding:"0 12px"}},[
      statBox("総件数", state.records.length),
      statBox("今月", state.records.filter(function(r){ return (r.date||"").startsWith(thisMonth); }).length),
      statBox("記入者数", authors.length)
    ]),
    el("div",{style:{display:"flex",flexDirection:"column",gap:"4px",padding:"0 8px"}},[
      sideBtn("🔄","最新に更新",function(){ loadRecords(); }),
      sideBtn("📥","CSV出力("+filtered.length+"件)",function(){ dlCSV(filtered); }),
      sideBtn("📂","CSVインポート",function(){ state.showImport=true; render(); }),
      sideBtn("📋","テンプレート取得",function(){ dlTemplate(); })
    ]),
    msgArea
  ]);

  // フィルター
  var searchI = el("input",{className:"m-search",placeholder:"🔍 日付・記入者・品名で検索…"});
  searchI.value = state.search;
  searchI.addEventListener("input",function(e){ state.search=e.target.value; render(); });

  function makeSelect(val, opts, onChange) {
    var s = el("select",{className:"m-select"});
    opts.forEach(function(o){
      var op = el("option",{value:o.v},o.t);
      if (o.v===val) op.selected=true;
      s.appendChild(op);
    });
    s.addEventListener("change",function(e){ onChange(e.target.value); render(); });
    return s;
  }
  var authorOpts = [{v:"all",t:"全記入者"}].concat(authors.map(function(a){ return {v:a,t:a}; }));
  var monthOpts  = [{v:"all",t:"全期間"}].concat(months.map(function(m){ return {v:m,t:m}; }));

  // テーブル
  var tableContent;
  if (filtered.length===0) {
    tableContent = el("div",{className:"m-empty"},
      state.loading?"読み込み中…":state.records.length===0?"まだ日報が保存されていません。「日報入力」タブから入力してください。":"条件に合う記録がありません");
  } else {
    var thead = el("tr",{style:{background:"#1E3A5F"}});
    ["製造日","記入者","１釜目","２釜目","３釜目","半製品","その他",""].forEach(function(h){
      thead.appendChild(el("th",{className:"m-th"},h));
    });
    var tbody = el("tbody");
    filtered.forEach(function(r,idx) {
      var tr = el("tr",{style:{cursor:"pointer",background:idx%2===0?"#fff":"#EEF4FB"}});
      tr.addEventListener("click",function(){ state.detail=r; render(); });
      tr.appendChild(el("td",{className:"m-td"},[el("b",null,r.date||"―")]));
      tr.appendChild(el("td",{className:"m-td"},r.author||"―"));
      BATCH_KEYS.forEach(function(key,i){
        var b = r[key];
        var td = el("td",{className:"m-td"});
        if (b&&b.name) {
          td.appendChild(el("span",{className:"m-dot",style:{background:BATCH_COLORS[i]}}));
          td.appendChild(document.createTextNode(b.name));
          td.appendChild(el("br"));
          td.appendChild(el("span",{className:"m-small"},b.qty||""));
        } else {
          td.appendChild(el("span",{style:{color:"#bbb"}},"―"));
        }
        tr.appendChild(td);
      });
      tr.appendChild(el("td",{className:"m-td-clamp"},r.semiProduct||"―"));
      tr.appendChild(el("td",{className:"m-td-clamp"},r.otherNotes||"―"));
      var actionTd = el("td",{className:"m-td",style:{whiteSpace:"nowrap"}});
      actionTd.addEventListener("click",function(e){ e.stopPropagation(); });
      var vBtn = el("button",{className:"m-view-btn"},"詳細");
      vBtn.addEventListener("click",function(){ state.detail=r; render(); });
      var dBtn = el("button",{className:"m-del-btn"},"削除");
      dBtn.addEventListener("click",function(){
        if (!confirm("この記録を削除しますか？")) return;
        ghDelete(r).then(function(){
          state.records = state.records.filter(function(x){ return x.id!==r.id; });
          showMsg(msgArea,"削除しました",true,3000); render();
        }).catch(function(e){ showMsg(msgArea,"削除失敗 → "+e.message,false); });
      });
      actionTd.appendChild(vBtn); actionTd.appendChild(dBtn);
      tr.appendChild(actionTd);
      tbody.appendChild(tr);
    });
    tableContent = el("div",{className:"m-table-wrap"},[
      el("table",{className:"m-table"},[el("thead",null,[thead]),tbody])
    ]);
  }

  var main = el("div",{className:"m-main"},[
    el("div",{className:"m-topbar"},[
      el("h2",{className:"m-page-title"},"日報一覧"),
      state.loading ? el("span",{className:"m-loading-tag"},"読み込み中…") : el("span")
    ]),
    el("div",{className:"m-filter-row"},[
      searchI,
      makeSelect(state.filterAuthor, authorOpts, function(v){ state.filterAuthor=v; }),
      makeSelect(state.filterMonth,  monthOpts,  function(v){ state.filterMonth=v; })
    ]),
    tableContent
  ]);

  return el("div",{className:"m-root"},[sidebar,main]);
}

// ─── Import Modal ─────────────────────────────────────────────
function buildImportModal() {
  var msgArea = el("div");
  var fileInput = el("input",{type:"file",accept:".csv",style:{display:"none"},id:"csv-file-input"});
  fileInput.addEventListener("change",function(e){
    var file = e.target.files[0];
    if (!file) return;
    state.showImport = false; render();
    var statusMsg = document.querySelector(".m-main") || document.body;
    file.text().then(function(text) {
      var parsed = parseCSV(text);
      if (parsed.length===0) {
        showMsg(statusMsg,"CSVにデータがありません。製造日の列を確認してください。",false); return;
      }
      state.loading=true; render();
      var success=0, fail=0;
      function saveNext(i) {
        if (i>=parsed.length) {
          state.loading=false;
          loadRecords();
          setTimeout(function(){
            var m = document.querySelector(".m-main");
            if(m) showMsg(m, fail===0?"✅ "+success+"件をインポートしました":success+"件成功、"+fail+"件失敗しました", fail===0);
          },500);
          return;
        }
        ghSave(parsed[i]).then(function(){ success++; }).catch(function(){ fail++; }).finally(function(){
          setTimeout(function(){ saveNext(i+1); }, 400);
        });
      }
      saveNext(0);
    });
  });

  var cancelBtn = el("button",{className:"modal-cancel-btn"},"キャンセル");
  cancelBtn.addEventListener("click",function(){ state.showImport=false; render(); });
  var tmplBtn = el("button",{className:"modal-tmpl-btn"},"📋 テンプレート取得");
  tmplBtn.addEventListener("click",function(){ dlTemplate(); });
  var fileLabel = el("label",{className:"modal-file-label",htmlFor:"csv-file-input"},"ファイルを選択");

  var overlay = el("div",{className:"modal-overlay"},[
    el("div",{className:"modal-box"},[
      el("h2",{className:"modal-title"},"📂 CSVインポート"),
      el("p",{className:"modal-desc"},"ExcelなどでCSVを作成してアップロードすると日報を一括登録できます。"),
      el("div",{className:"modal-info"},[
        el("b",null,"必須列："),document.createTextNode("製造日（YYYY-MM-DD形式）、記入者"),
        el("br"),
        el("b",null,"任意列："),document.createTextNode("各釜の品名・製造数・開始終了時間・備考、半製品、その他"),
        el("br"),
        el("b",null,"ヒント："),document.createTextNode("まずテンプレートをダウンロードして記入するのが確実です")
      ]),
      el("div",{className:"modal-drop"},[
        fileInput,
        el("div",{className:"modal-drop-icon"},"📄"),
        el("div",{className:"modal-drop-text"},"CSVファイルを選択してください"),
        fileLabel
      ]),
      msgArea,
      el("div",{className:"modal-btns"},[cancelBtn,tmplBtn])
    ])
  ]);
  return overlay;
}

// ─── Start ────────────────────────────────────────────────────
render();
</script>
</body>
</html>
